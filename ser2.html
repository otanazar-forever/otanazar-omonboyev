<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top, #0f2027, #203a43, #2c5364);
            font-family: Poppins, sans-serif;
            overflow: hidden
        }

        .background {
            position: fixed;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, #0f2027, #203a43, #2c5364);
            z-index: -2
        }

        .background::before,
        .background::after {
            content: "";
            position: absolute;
            width: 600px;
            height: 600px;
            background: linear-gradient(45deg, #ffd700, #ff9a00, #ffd700);
            filter: blur(120px);
            opacity: .25;
            animation: move 12s linear infinite alternate
        }

        .background::after {
            right: -200px;
            bottom: -200px;
            animation-delay: 6s
        }

        @keyframes move {
            0% {
                transform: translate(-100px, -100px)
            }

            100% {
                transform: translate(100px, 100px)
            }
        }

        .wrapper {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 50px;
            max-width: 850px;
            width: 92%;
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 80px rgba(0, 0, 0, .6);
            border: 1px solid rgba(255, 255, 255, .15)
        }

        .wrapper::before {
            content: "";
            position: absolute;
            inset: -3px;
            border-radius: 22px;
            background: linear-gradient(45deg, #ffd700, #ff8c00, #ffd700, #ff8c00);
            background-size: 300%;
            z-index: -1;
            animation: borderGlow 8s linear infinite
        }

        @keyframes borderGlow {
            0% {
                background-position: 0 0
            }

            50% {
                background-position: 300% 0
            }

            100% {
                background-position: 0 0
            }
        }

        .title {
            text-align: center;
            font-family: "Playfair Display", serif;
            font-size: 36px;
            letter-spacing: 6px;
            color: #fff;
            margin-bottom: 35px;
            position: relative
        }

        .title::after {
            content: "";
            display: block;
            width: 120px;
            height: 3px;
            margin: 12px auto 0;
            background: linear-gradient(to right, transparent, #ffd700, transparent)
        }

        .frame {
            position: relative;
            padding: 12px;
            border-radius: 12px;
            background: linear-gradient(145deg, #111, #1e1e1e);
            box-shadow: inset 0 0 30px rgba(255, 255, 255, .05), 0 20px 60px rgba(0, 0, 0, .8)
        }

        .frame::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 12px;
            padding: 3px;
            background: linear-gradient(45deg, #ffd700, #ff9a00, #ffd700);
            -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude
        }

        img {
            width: 100%;
            border-radius: 8px;
            display: block;
            transition: transform .6s ease, box-shadow .6s ease
        }

        .frame:hover img {
            transform: scale(1.05);
            box-shadow: 0 20px 60px rgba(0, 0, 0, .8)
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            color: #e0e0e0;
            font-size: 14px;
            letter-spacing: 2px;
            position: relative
        }

        .footer::before {
            content: "";
            display: block;
            width: 60%;
            height: 1px;
            margin: 0 auto 10px;
            background: linear-gradient(to right, transparent, #ffd700, transparent)
        }

        .decor1,
        .decor2 {
            position: absolute;
            width: 120px;
            height: 120px;
            border: 2px solid rgba(255, 215, 0, .3);
            border-radius: 50%;
            animation: rotate 14s linear infinite
        }

        .decor1 {
            top: -60px;
            left: -60px
        }

        .decor2 {
            bottom: -60px;
            right: -60px;
            animation-direction: reverse
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg)
            }

            to {
                transform: rotate(360deg)
            }
        }
    </style>
</head>

<body>
    <div class="background"></div>

    <div class="wrapper">
        <div class="decor1"></div>
        <div class="decor2"></div>

        <div class="title">SERTIFIKAT</div>

        <div class="frame">
            <img src="./Social Media.png" alt="Certificate">
        </div>

        <div class="footer">
            BU SERTIFIKAT 2025-YIL 9-APREL KUNI BERILGAN
        </div>

    </div>

</body>

</html>
